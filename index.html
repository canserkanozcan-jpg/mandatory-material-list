<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b1f33"><link rel="manifest" href="manifest.json"><title>Mandatory Material List</title><style>
:root{--bg:#f4f7fb;--panel:#fff;--navy:#0b1f33;--blue:#1667c5;--line:#dbe4ef;--text:#182433;--muted:#65758a;--green:#137a45;--shadow:0 10px 30px rgba(11,31,51,.09)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}header{background:linear-gradient(135deg,#0b1f33,#154b7f);color:#fff;padding:calc(20px + env(safe-area-inset-top)) 18px 24px}.wrap{max-width:1080px;margin:auto}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:#ffffff22;display:grid;place-items:center;font-weight:900}.sub{opacity:.82;font-size:13px;margin-top:5px}main{padding:18px 14px 40px}.panel,.card,.empty{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.panel{padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{font-size:12px;color:var(--muted);font-weight:800;display:block;margin-bottom:6px}select,input{width:100%;border:1px solid var(--line);border-radius:13px;padding:14px;font-size:16px;background:#fff}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.stat{background:#eaf3ff;padding:11px;border-radius:13px}.stat b{display:block;font-size:18px}.stat span{font-size:11px;color:var(--muted)}.section{margin:18px 2px 8px;color:var(--muted);font-weight:800}.card{overflow:hidden;margin-bottom:10px}.head{padding:15px;display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line)}.pn{font-weight:900;font-size:17px}.desc{color:var(--muted);font-size:13px;margin-top:4px}.qty{background:#eaf8f0;color:var(--green);border-radius:13px;min-width:84px;padding:9px;text-align:center;font-weight:900}.qty small{display:block;font-size:9px}.details{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line)}.detail{background:#fff;padding:10px}.detail span{display:block;font-size:10px;color:var(--muted)}details{padding:11px 15px;color:var(--muted);font-size:12px}.empty{padding:25px;text-align:center;color:var(--muted)}footer{text-align:center;color:var(--muted);font-size:11px;padding:18px}.warn{color:#9a6700;background:#fff7d6;border:1px solid #f1d77a;padding:10px;border-radius:12px;margin-top:10px;font-size:12px}@media(max-width:650px){.grid{grid-template-columns:1fr}.details{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}.stats .stat:last-child{grid-column:1/-1}}</style></head><body>
<header><div class="wrap"><div class="brand"><div class="logo">MML</div><div><h2 style="margin:0">Mandatory Material List</h2><div class="sub">Uçak seçimi • Task Card bazlı doğrulanmış ortak malzemeler</div></div></div></div></header>
<main class="wrap"><section class="panel"><div class="grid"><div><label>Uçak</label><select id="aircraft"></select></div><div><label>Task Card ara</label><input id="search" type="search" placeholder="Örn: A320-24-064"></div></div><div class="stats"><div class="stat"><b id="type">-</b><span>Aircraft Type</span></div><div class="stat"><b id="engine">-</b><span>Engine</span></div><div class="stat"><b id="count">0</b><span>Ortak malzeme satırı</span></div></div><div id="warning"></div></section><div id="title" class="section"></div><section id="results"></section><section id="empty" class="empty">Uçak seçip Task Card numarası yazın.</section></main><footer>Geçmiş çekim verisine dayanır. Güncel efektivite, revizyon ve task requirement ayrıca kontrol edilmelidir.</footer>
<script src="fleet-data.js"></script><script>
const fleet=window.MML_FLEET.aircraft,sel=document.getElementById('aircraft'),q=document.getElementById('search'),res=document.getElementById('results'),empty=document.getElementById('empty');
Object.keys(fleet).sort().forEach(r=>sel.add(new Option(`${r} • ${fleet[r].aircraftType} • ${fleet[r].engine}`,r)));
function fmt(n){return Number.isInteger(n)?String(n):Number(n).toFixed(2).replace(/0+$/,'').replace(/\.$/,'')}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function render(){const a=fleet[sel.value],cards=a.taskCards,term=q.value.trim().toUpperCase();document.getElementById('type').textContent=a.aircraftType;document.getElementById('engine').textContent=a.engine;document.getElementById('count').textContent=Object.values(cards).reduce((s,x)=>s+x.length,0);document.getElementById('warning').innerHTML=a.stats.note?`<div class="warn">${esc(a.stats.note)}</div>`:'';const names=Object.keys(cards).filter(t=>!term||t.includes(term)).sort();if(!term){res.innerHTML='';document.getElementById('title').textContent='';empty.textContent='Task Card numarası yazarak malzemeleri görüntüleyin.';empty.style.display='block';return}if(!names.length){res.innerHTML='';document.getElementById('title').textContent='';empty.textContent='Bu uçak ve Task Card için doğrulanmış ortak malzeme bulunamadı.';empty.style.display='block';return}empty.style.display='none';document.getElementById('title').textContent=`${names.length} kart • ${names.reduce((s,t)=>s+cards[t].length,0)} malzeme`;res.innerHTML=names.map(t=>`<div class="section">${esc(t)}</div>`+cards[t].map(m=>`<article class="card"><div class="head"><div><div class="pn">${esc(m.pn)}</div><div class="desc">${esc(m.description)}</div></div><div class="qty">${fmt(m.recommendedQty)}<small>ÇEKİLECEK QTY</small></div></div><div class="details"><div class="detail"><span>WO Sayısı</span><b>${m.woCount}</b></div><div class="detail"><span>Minimum</span><b>${fmt(m.minQty)}</b></div><div class="detail"><span>Ortalama</span><b>${fmt(m.avgQty)}</b></div><div class="detail"><span>Maksimum</span><b>${fmt(m.maxQty)}</b></div></div><details><summary>WO bazlı miktarlar</summary>${esc(m.woQty)}<br><b>${esc(m.rule)}</b></details></article>`).join('')).join('')}
sel.addEventListener('change',()=>{q.value='';render()});q.addEventListener('input',render);sel.value=Object.keys(fleet).sort()[0];render();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script></body></html>
